<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#508883;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6ba8a3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2540;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="url(#bgGrad)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="url(#grad)" stroke-width="0.75" opacity="0.4"/>
  <!-- "SV" initials -->
  <text
    x="5"
    y="22"
    font-family="Inter, system-ui, sans-serif"
    font-size="15"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#grad)"
  >SV</text>
  <!-- Accent underline -->
  <line x1="5" y1="25.5" x2="27" y2="25.5" stroke="url(#grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
</svg>
